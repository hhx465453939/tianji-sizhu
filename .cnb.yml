# ============================================================
# TianJi-SiZhu CNB Pipeline
# ============================================================

# ── Release Pipeline: tag push 触发构建 + 发布 ──────────────
$:
  tag_push:
    - runner:
        tags: cnb:arch:amd64
        cpus: 4
      docker:
        image: golang:1.23
        volumes:
          - /root/go/pkg
          - /root/.cache
          - /root/.npm
      stages:
        - name: install system deps
          script: |
            apt-get update -qq
            apt-get install -y -qq \
              nodejs npm \
              nsis \
              gcc-mingw-w64-x86-64 \
              zip \
              > /dev/null 2>&1
            echo "Node: $(node --version)"
            echo "Go: $(go version)"

        - name: install wails
          script: |
            go install github.com/wailsapp/wails/v2/cmd/wails@v2.12.0
            export PATH="$(go env GOPATH)/bin:$PATH"
            wails version

        - name: build windows
          env:
            CGO_ENABLED: "1"
            CC: x86_64-w64-mingw32-gcc
            CXX: x86_64-w64-mingw32-g++
          script: |
            export PATH="$(go env GOPATH)/bin:$PATH"
            wails build -platform windows/amd64 -nsis
            echo "=== Windows build output ==="
            ls -la build/bin/ || echo "No build/bin"
            find build/bin -type f -name "*.exe" | head -10

        - name: build linux
          script: |
            export PATH="$(go env GOPATH)/bin:$PATH"
            wails build -platform linux/amd64
            echo "=== Linux build output ==="
            ls -la build/bin/

        - name: package artifacts
          script: |
            TAG="${CNB_BRANCH}"
            mkdir -p release
            # Windows exe / installer
            INSTALLER=$(find build/bin -type f -name "*installer*" | head -1)
            if [ -n "$INSTALLER" ]; then
              cp "$INSTALLER" "release/tianji-sizhu-${TAG}-windows-amd64-installer.exe"
            fi
            PLAIN_EXE=$(find build/bin -type f -name "tianji-sizhu.exe" | head -1)
            if [ -n "$PLAIN_EXE" ]; then
              cp "$PLAIN_EXE" "release/tianji-sizhu-${TAG}-windows-amd64.exe"
            fi
            # Linux binary
            if [ -f "build/bin/tianji-sizhu" ]; then
              tar czf "release/tianji-sizhu-${TAG}-linux-amd64.tar.gz" -C build/bin tianji-sizhu
            fi
            echo "=== Release artifacts ==="
            ls -la release/

        - name: create release
          type: git:release
          options:
            title: "TianJi-SiZhu ${CNB_BRANCH}"
            description: |
              ## 天机四柱 ${CNB_BRANCH}

              开源四柱排盘桌面客户端，为 AI 解读而生。

              ### 下载
              | 平台 | 文件 |
              |------|------|
              | Windows (安装程序) | *-installer.exe |
              | Windows (免安装) | *-windows-amd64.exe |
              | Linux | *-linux-amd64.tar.gz |

        - name: upload attachments
          image: cnbcool/attachments:latest
          settings:
            attachments:
              - "./release/*"

  # ── VS Code Cloud IDE ───────────────────────────────────────
  vscode:
    - docker:
        image: docker.cnb.cool/ciallo.cv/default-dev-env:latest
      services:
        - name: vscode
          options:
            keepAliveTimeout: 2h
        - docker
      stages:
        - name: setup-dev-user-prompt
          script: |
            # Install prerequisites
            apt-get update -qq && apt-get install -y -qq sudo acl p7zip-full >/dev/null 2>&1 || true
            # Inject interactive user registration into bash profile
            cp /workspace/.ide/setup-user.sh /etc/profile.d/01-dev-user-setup.sh
            chmod +x /etc/profile.d/01-dev-user-setup.sh
            # Also add to .bashrc for non-login shells (e.g. VS Code terminal)
            grep -q 'dev-user-setup' /root/.bashrc 2>/dev/null || \
              echo '[ -f /etc/profile.d/01-dev-user-setup.sh ] && source /etc/profile.d/01-dev-user-setup.sh' >> /root/.bashrc
            echo "Dev user registration prompt installed."
        - name: deploy-claude-config
          script: |
            # Deploy Claude Code global config (skills, commands, agents, scripts)
            TEMPLATE_ARCHIVE="/workspace/.ide/claude-config-template.7z"
            CLAUDE_HOME="/root/.claude"
            if [ -f "$TEMPLATE_ARCHIVE" ]; then
              mkdir -p "$CLAUDE_HOME"
              # Extract template to temp, then move contents into ~/.claude/
              TMPDIR=$(mktemp -d)
              7z x -o"$TMPDIR" -y "$TEMPLATE_ARCHIVE" >/dev/null 2>&1
              SRC="$TMPDIR/系统及.claude迁移模板"
              # Deploy each component
              for dir in commands skills agents scripts templates; do
                if [ -d "$SRC/$dir" ]; then
                  rm -rf "$CLAUDE_HOME/$dir"
                  cp -r "$SRC/$dir" "$CLAUDE_HOME/$dir"
                fi
              done
              # Deploy CLAUDE.md as global instructions if not already present
              if [ -f "$SRC/CLAUDE.md" ]; then
                cp "$SRC/CLAUDE.md" "$CLAUDE_HOME/CLAUDE.md"
              fi
              # Deploy ralph-config if present
              if [ -f "$SRC/ralph-config.json" ]; then
                cp "$SRC/ralph-config.json" "$CLAUDE_HOME/ralph-config.json"
              fi
              rm -rf "$TMPDIR"
              echo "Claude Code config deployed: commands, skills, agents, scripts, templates"
            else
              echo "WARNING: Claude config template not found at $TEMPLATE_ARCHIVE"
            fi
            # Also deploy for any non-root users created later
            cat > /etc/profile.d/02-claude-config.sh << 'PROFILE_EOF'
            if [ "$(id -u)" -ne 0 ] && [ ! -d "$HOME/.claude/skills" ]; then
              if [ -d /root/.claude/skills ]; then
                mkdir -p "$HOME/.claude"
                for dir in commands skills agents scripts templates; do
                  [ -d "/root/.claude/$dir" ] && cp -r "/root/.claude/$dir" "$HOME/.claude/$dir"
                done
                [ -f /root/.claude/CLAUDE.md ] && cp /root/.claude/CLAUDE.md "$HOME/.claude/CLAUDE.md"
                [ -f /root/.claude/ralph-config.json ] && cp /root/.claude/ralph-config.json "$HOME/.claude/ralph-config.json"
              fi
            fi
            PROFILE_EOF
            chmod +x /etc/profile.d/02-claude-config.sh
        - name: ready
          script: echo "vscode dev environment ready"
