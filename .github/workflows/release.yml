# ============================================================
# TianJi-SiZhu Release Pipeline
# ============================================================
name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  GO_VERSION: "1.23"
  NODE_VERSION: "22"
  APP_NAME: "tianji-sizhu"

jobs:
  build-windows:
    runs-on: windows-2022
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install Wails CLI
        shell: bash
        run: |
          go install github.com/wailsapp/wails/v2/cmd/wails@v2.12.0
          echo "$(go env GOPATH)/bin" >> $GITHUB_PATH

      - name: Verify tools
        shell: bash
        run: |
          echo "Go: $(go version)"
          echo "Node: $(node --version)"
          echo "npm: $(npm --version)"
          echo "GOPATH: $(go env GOPATH)"
          echo "PATH: $PATH"
          wails version || echo "WARN: wails not in PATH yet"
          which wails || echo "WARN: which wails failed"

      - name: Install pnpm and frontend dependencies
        shell: bash
        run: |
          npm install -g pnpm
          cd frontend
          pnpm install || npm install

      - name: Build
        shell: bash
        run: |
          wails build -platform windows/amd64 -nsis
          echo "=== build/bin contents ==="
          ls -la build/bin/ || echo "build/bin not found"

      - name: Find installer
        id: find
        shell: bash
        run: |
          echo "=== Looking for installer ==="
          find build/bin -type f -name "*.exe" | head -10
          INSTALLER=$(find build/bin -type f -name "*installer*" | head -1)
          if [ -z "$INSTALLER" ]; then
            INSTALLER=$(find build/bin -type f -name "*.exe" | head -1)
          fi
          echo "installer_path=$INSTALLER" >> $GITHUB_OUTPUT
          echo "Selected: $INSTALLER"

      - name: Upload
        if: steps.find.outputs.installer_path != ''
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: ${{ steps.find.outputs.installer_path }}

  build-macos:
    runs-on: macos-13
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install Wails CLI
        run: |
          go install github.com/wailsapp/wails/v2/cmd/wails@v2.12.0
          echo "$(go env GOPATH)/bin" >> $GITHUB_PATH

      - name: Verify tools
        run: |
          echo "Go: $(go version)"
          echo "Node: $(node --version)"
          wails version

      - name: Install pnpm and frontend dependencies
        run: |
          npm install -g pnpm
          cd frontend
          pnpm install || npm install

      - name: Build
        run: |
          wails build -platform darwin/amd64
          echo "=== build/bin contents ==="
          ls -la build/bin/

      - name: Create DMG
        run: |
          ls -la build/bin/
          mkdir -p dmg-staging
          cp -r "build/bin/${{ env.APP_NAME }}.app" dmg-staging/
          ln -s /Applications dmg-staging/Applications
          hdiutil create \
            -volname "TianJi-SiZhu" \
            -srcfolder dmg-staging \
            -ov -format UDZO \
            "build/bin/${{ env.APP_NAME }}-darwin-amd64.dmg"

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: macos-dmg
          path: build/bin/${{ env.APP_NAME }}-darwin-amd64.dmg

  build-linux:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.0-dev build-essential pkg-config

      - name: Install Wails CLI
        run: |
          go install github.com/wailsapp/wails/v2/cmd/wails@v2.12.0
          echo "$(go env GOPATH)/bin" >> $GITHUB_PATH

      - name: Verify tools
        run: |
          echo "Go: $(go version)"
          echo "Node: $(node --version)"
          wails version

      - name: Install pnpm and frontend dependencies
        run: |
          npm install -g pnpm
          cd frontend
          pnpm install || npm install

      - name: Build
        run: |
          wails build -platform linux/amd64
          echo "=== build/bin contents ==="
          ls -la build/bin/

      - name: Package tar.gz
        run: |
          cd build/bin
          tar czf "${{ env.APP_NAME }}-linux-amd64.tar.gz" "${{ env.APP_NAME }}"

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: linux-binary
          path: |
            build/bin/${{ env.APP_NAME }}-linux-amd64.tar.gz

  publish-release:
    needs: [build-windows, build-macos, build-linux]
    if: always() && !cancelled()
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: List release assets
        run: find release-assets -type f | sort

      - name: Generate changelog
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          PREV=$(git tag --sort=-v:refname | grep '^v' | sed -n '2p')
          if [ -z "$PREV" ]; then
            CHANGES=$(git log --oneline --no-decorate | head -50)
          else
            CHANGES=$(git log --oneline --no-decorate "${PREV}..HEAD")
          fi
          {
            echo "## TianJi-SiZhu ${TAG}"
            echo ""
            echo "Open-source BaZi desktop client."
            echo ""
            echo "### Downloads"
            echo "| Platform | File |"
            echo "|----------|------|"
            echo "| Windows | *.exe |"
            echo "| macOS | *.dmg |"
            echo "| Linux | *.tar.gz |"
            echo ""
            echo "### Commits"
            echo "$CHANGES"
          } > changelog.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "TianJi-SiZhu ${{ github.ref_name }}"
          body_path: changelog.md
          draft: false
          prerelease: false
          fail_on_unmatched_files: false
          files: |
            release-assets/**/*.exe
            release-assets/**/*.dmg
            release-assets/**/*.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
