# ============================================================
# TianJi-SiZhu Release Pipeline
# Triggers on version tag push (v*), builds for Win/Mac/Linux,
# creates installers, and publishes a GitHub Release.
# ============================================================
name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  WAILS_VERSION: "v2.12.0"
  GO_VERSION: "1.23"
  NODE_VERSION: "22"
  APP_NAME: "tianji-sizhu"
  APP_DISPLAY_NAME: "TianJi-SiZhu"

jobs:
  # ──────────────────────────────────────────────
  # Windows: NSIS Installer (.exe)
  # ──────────────────────────────────────────────
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@${{ env.WAILS_VERSION }}

      - name: Install NSIS
        run: choco install nsis -y

      - name: Install frontend dependencies
        run: |
          cd frontend
          npm install

      - name: Build Windows amd64
        run: wails build -platform windows/amd64 -nsis -o ${{ env.APP_NAME }}.exe

      - name: Find installer
        id: find
        shell: pwsh
        run: |
          $files = Get-ChildItem -Path build/bin -Filter "*installer*" -Recurse
          if ($files.Count -eq 0) {
            Write-Host "No installer found, listing build/bin:"
            Get-ChildItem build/bin | Format-Table Name, Length
            $files = Get-ChildItem -Path build/bin -Filter "*.exe" -Recurse
          }
          foreach ($f in $files) {
            Write-Host "Found: $($f.FullName) ($([math]::Round($f.Length/1MB,2)) MB)"
          }
          $installer = $files | Where-Object { $_.Name -match "installer" } | Select-Object -First 1
          if ($installer) {
            echo "installer_path=$($installer.FullName)" >> $env:GITHUB_OUTPUT
          } else {
            $exe = $files | Select-Object -First 1
            echo "installer_path=$($exe.FullName)" >> $env:GITHUB_OUTPUT
          }

      - name: Upload Windows installer
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: ${{ steps.find.outputs.installer_path }}
          if-no-files-found: error

  # ──────────────────────────────────────────────
  # macOS: Universal Binary DMG (.dmg)
  # ──────────────────────────────────────────────
  build-macos:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@${{ env.WAILS_VERSION }}

      - name: Install frontend dependencies
        run: |
          cd frontend
          npm install

      - name: Build macOS universal binary
        run: wails build -platform darwin/universal -o ${{ env.APP_NAME }}

      - name: Create DMG
        run: |
          mkdir -p dmg-staging
          cp -r "build/bin/${{ env.APP_NAME }}.app" dmg-staging/
          ln -s /Applications dmg-staging/Applications
          hdiutil create \
            -volname "${{ env.APP_DISPLAY_NAME }}" \
            -srcfolder dmg-staging \
            -ov -format UDZO \
            "build/bin/${{ env.APP_NAME }}-darwin-universal.dmg"

      - name: Upload macOS DMG
        uses: actions/upload-artifact@v4
        with:
          name: macos-dmg
          path: build/bin/${{ env.APP_NAME }}-darwin-universal.dmg
          if-no-files-found: error

  # ──────────────────────────────────────────────
  # Linux: AppImage (.AppImage) + tar.gz
  # ──────────────────────────────────────────────
  build-linux:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@${{ env.WAILS_VERSION }}

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.0-dev \
            build-essential \
            pkg-config

      - name: Install frontend dependencies
        run: |
          cd frontend
          npm install

      - name: Build Linux amd64
        run: wails build -platform linux/amd64 -o ${{ env.APP_NAME }}

      - name: Package as tar.gz
        run: |
          cd build/bin
          tar czf "${{ env.APP_NAME }}-linux-amd64.tar.gz" "${{ env.APP_NAME }}"

      - name: Create AppImage
        run: |
          APPDIR="build/AppDir"
          mkdir -p "${APPDIR}/usr/bin"
          mkdir -p "${APPDIR}/usr/share/applications"
          mkdir -p "${APPDIR}/usr/share/icons/hicolor/256x256/apps"

          cp "build/bin/${{ env.APP_NAME }}" "${APPDIR}/usr/bin/${{ env.APP_NAME }}"
          chmod +x "${APPDIR}/usr/bin/${{ env.APP_NAME }}"

          printf '[Desktop Entry]\nName=%s\nExec=%s\nIcon=%s\nType=Application\nCategories=Utility;\n' \
            "${{ env.APP_DISPLAY_NAME }}" "${{ env.APP_NAME }}" "${{ env.APP_NAME }}" \
            > "${APPDIR}/usr/share/applications/${{ env.APP_NAME }}.desktop"

          if [ -f "build/appicon.png" ]; then
            cp "build/appicon.png" "${APPDIR}/usr/share/icons/hicolor/256x256/apps/${{ env.APP_NAME }}.png"
            cp "build/appicon.png" "${APPDIR}/${{ env.APP_NAME }}.png"
          fi

          ln -s "usr/bin/${{ env.APP_NAME }}" "${APPDIR}/AppRun"

          wget -q "https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage" -O linuxdeploy
          chmod +x linuxdeploy
          ./linuxdeploy --appdir "${APPDIR}" --output appimage
          mv ./*.AppImage "build/bin/${{ env.APP_NAME }}-linux-amd64.AppImage"

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-packages
          path: |
            build/bin/${{ env.APP_NAME }}-linux-amd64.tar.gz
            build/bin/${{ env.APP_NAME }}-linux-amd64.AppImage
          if-no-files-found: warn

  # ──────────────────────────────────────────────
  # Publish GitHub Release
  # ──────────────────────────────────────────────
  publish-release:
    needs: [build-windows, build-macos, build-linux]
    if: always() && !cancelled()
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: List release assets
        run: find release-assets -type f | sort

      - name: Generate changelog
        run: |
          TAG_NAME="${GITHUB_REF#refs/tags/}"
          PREV_TAG=$(git tag --sort=-v:refname | grep '^v' | sed -n '2p')
          if [ -z "$PREV_TAG" ]; then
            CHANGES=$(git log --oneline --no-decorate | head -50)
          else
            CHANGES=$(git log --oneline --no-decorate "${PREV_TAG}..HEAD")
          fi
          {
            echo "## TianJi-SiZhu ${TAG_NAME}"
            echo ""
            echo "Open-source BaZi (Four Pillars) desktop client, built for AI-powered analysis."
            echo ""
            echo "### Features"
            echo "- Four Pillars, Ten Gods, Five Elements, Da Yun, Liu Nian, Shen Sha"
            echo "- Data visualization: Five Element radar, Da Yun timeline"
            echo "- Local SQLite storage, offline ready"
            echo "- One-click structured AI Prompt generation"
            echo "- Ancient Chinese aesthetic theme"
            echo "- Lightweight native app based on Wails v2"
            echo ""
            echo "### Downloads"
            echo "| Platform | File | Description |"
            echo "|----------|------|-------------|"
            echo "| Windows | tianji-sizhu-*-installer.exe | NSIS installer |"
            echo "| macOS | tianji-sizhu-darwin-universal.dmg | Intel + Apple Silicon |"
            echo "| Linux | tianji-sizhu-linux-amd64.AppImage | Portable |"
            echo "| Linux | tianji-sizhu-linux-amd64.tar.gz | Archive |"
            echo ""
            echo "### Commits"
            echo "$CHANGES"
          } > changelog.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "TianJi-SiZhu ${{ github.ref_name }}"
          body_path: changelog.md
          draft: false
          prerelease: false
          fail_on_unmatched_files: false
          files: |
            release-assets/**/*.exe
            release-assets/**/*.dmg
            release-assets/**/*.AppImage
            release-assets/**/*.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
